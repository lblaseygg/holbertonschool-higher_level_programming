<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Items List - My Flask App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #333;
            color: white;
            padding: 1rem;
        }
        nav ul {
            list-style: none;
            padding: 0;
            display: flex;
            gap: 1rem;
        }
        nav a {
            color: white;
            text-decoration: none;
        }
        main {
            padding: 2rem;
        }
        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 1rem;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
        .items-list {
            list-style: none;
            padding: 0;
        }
        .items-list li {
            padding: 0.5rem;
            margin: 0.5rem 0;
            background-color: #f4f4f4;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    {% include 'header.html' %}
    
    <main>
        <h1>Items List</h1>
        {% if items %}
            <ul class="items-list">
                {% for item in items %}
                    <li>{{ item }}</li>
                {% endfor %}
            </ul>
        {% else %}
            <p>No items found</p>
        {% endif %}
    </main>

    {% include 'footer.html' %}
</body>
</html>
